# Production radio-run profile for the accepted robust short-range service smoke.
# Dynamic LAN addresses and artifact paths are supplied by the smoke script as
# CLI overrides; the stable RF/runtime profile lives here.

[adapter]
vid = 3034
pid = 34834

[macos_usbhost]
enabled = true
configuration_value = 1
interface_number = 0
bulk_in_endpoint = 129
bulk_out_endpoint = 2
bulk_out_endpoint_count = 3
poll_attempts = 25
poll_delay_ms = 100

[radio]
channel = 36
bandwidth_mhz = 20
firmware = "/tmp/rtl8812aefw.bin"
duration_ms = 55000
rx_timeout_ms = 20
tx_burst_limit = 4
max_datagrams = 0

[wfb]
bind = "0.0.0.0:5611"
link_id = 1
radio_port = 1
rx_aggregator = "127.0.0.1:5801"
rx_wlan_idx = 0
rx_mcs_index = 1

[calibration]
profile = "current_default"

[heartbeat]
enabled = true
half_period_ms = 500

[authorization]
transmit = true
live_register_writes = false

[artifacts]
ready_file = "/tmp/wfb-radio-run-service-ready.json"
health_file = "/tmp/wfb-radio-run-service-health.json"
